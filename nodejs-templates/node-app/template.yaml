apiVersion: scaffolder.backstage.io/v1beta3
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-template
kind: Template
metadata:
  name: nodejs-template
  title: Node.js Template
  description: template for the scaffolder that creates a simple Node.js service
spec:
  owner: user:guest
  type: service

  # These parameters are used to generate the input form in the frontend, and are
  # used to gather input data for the execution of the template.
  parameters:
    - title: Fill in some steps
      required:
        - name
      properties:
        name:
          title: Name
          type: string
          description: Unique name of the component
          ui:autofocus: true
          ui:options:
            rows: 5
    - title: Choose a location
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  # These steps are executed in the scaffolder backend, using data that we gathered
  # via the parameters above.
  steps:
    # Each step executes an action, in this case one templates files into the working directory.
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./content
        values:
          name: ${{ parameters.name }}

    - id: submit-request
      name: Submit Repository Request
      action: github:repository-request:create-pr
      input:
        targetRepoUrl: ${{ parameters.repoUrl }}
        description: Node.js service - ${{ parameters.name }}
        templateName: nodejs-template
        templateTitle: Node.js Template
        repoVisibility: public
        defaultBranch: main
        catalogInfoPath: /catalog-info.yaml
        parameters:
          name: ${{ parameters.name }}

    - id: notify
      name: Notify
      action: notification:send
      input:
        recipients: entity
        entityRefs:
          - user:default/guest
        title: 'Repository request submitted'
        info: 'Node.js repository request is pending Platform Team approval'
        severity: 'normal'

  output:
    text:
      - title: Request ID
        content: ${{ steps['submit-request'].output.requestId }}
      - title: Status
        content: ${{ steps['submit-request'].output.status }}
    links:
      - title: Approval Pull Request
        url: ${{ steps['submit-request'].output.pullRequestUrl }}
