name: CI/CD - GCP Cloud Function

permissions:
  contents: write
  id-token: write   # needed for Workload Identity Federation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  FUNCTION_NAME: ${{ vars.FUNCTION_NAME }}
  JAVA_RUNTIME: ${{ vars.JAVA_RUNTIME || 'java21' }}

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to GCP Cloud Functions?"
        required: true
        default: "false"

jobs:

  # ==========================
  # SET VERSION
  # ==========================

  setversion:
    runs-on: ubuntu-latest

    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Read and Bump Version
        id: bump
        run: |
          VERSION=$(mvn help:evaluate \
            -Dexpression=project.version \
            -q \
            -DforceStdout)

          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

          mvn versions:set \
            -DnewVersion=${NEW_VERSION} \
            -DgenerateBackupPoms=false

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Upload Updated Pom
        uses: actions/upload-artifact@v5
        with:
          name: updated-pom
          path: pom.xml

  # ==========================
  # BUILD & TEST
  # ==========================

  build:
    runs-on: ubuntu-latest
    needs: setversion

    steps:
      - uses: actions/checkout@v5

      - name: Download Updated Pom
        uses: actions/download-artifact@v5
        with:
          name: updated-pom

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test
        run: mvn clean verify

      - name: Upload Deployment JAR
        uses: actions/upload-artifact@v5
        with:
          name: deployment-jar
          path: target/deployment.jar

  # ==========================
  # SONAR
  # ==========================

  sonar:
    runs-on: ubuntu-latest
    needs:
      - setversion
      - build

    steps:
      - uses: actions/checkout@v5

      - name: Download Updated Pom
        uses: actions/download-artifact@v5
        with:
          name: updated-pom

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verify Sonar Token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is missing"
            exit 1
          fi

      - name: Create Sonar Project If Missing
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          curl -u "${SONAR_TOKEN}:" \
            -X POST \
            "https://sonarcloud.io/api/projects/create" \
            -d "organization=devops-champ" \
            -d "project=${{ github.event.repository.name }}" \
            -d "name=${{ github.event.repository.name }}"
        continue-on-error: true

      - name: Sonar Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
            -Dsonar.projectKey=${{ github.event.repository.name }} \
            -Dsonar.organization=devops-champ \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN

  # ==========================
  # DEPLOY TO GCP
  # ==========================

  deploy:
    runs-on: ubuntu-latest
    needs:
      - setversion
      - build
      - sonar

    if: inputs.deploy == 'true'

    steps:
      - uses: actions/checkout@v5

      - name: Download Deployment JAR
        uses: actions/download-artifact@v5
        with:
          name: deployment-jar
          path: target

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy Cloud Function (Gen 2)
        run: |
          gcloud functions deploy ${{ env.FUNCTION_NAME }} \
            --gen2 \
            --runtime ${{ env.JAVA_RUNTIME }} \
            --region ${{ env.GCP_REGION }} \
            --trigger-http \
            --allow-unauthenticated \
            --entry-point com.example.CloudFunction \
            --source . \
            --project ${{ env.GCP_PROJECT_ID }}

      - name: Print Function URL
        run: |
          gcloud functions describe ${{ env.FUNCTION_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format="value(serviceConfig.uri)"
