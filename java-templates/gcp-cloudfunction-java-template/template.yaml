apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: gcp-cloudfunction-java-template
  title: GCP Cloud Function (Java)
  description: Create a Google Cloud Function in Java with CI/CD, TechDocs, and Backstage catalog registration
  tags:
    - java
    - gcp
    - cloud-function
    - serverless

spec:
  owner: user:default/guest
  type: service

  parameters:
    - title: Service Details
      required:
        - repoOwner
        - repoName
        - functionName
        - gcpProjectId
        - gcpRegion
      properties:
        repoOwner:
          title: Repository Owner
          type: string
          description: GitHub organization or username
          default: devops-champ
          ui:autofocus: true

        repoName:
          title: Repository Name
          type: string
          description: Name of the GitHub repository (lowercase recommended)

        functionName:
          title: Cloud Function Name
          type: string
          description: Name of the deployed GCP Cloud Function (lowercase, hyphens allowed)

        gcpProjectId:
          title: GCP Project ID
          type: string
          description: Your Google Cloud project ID

        gcpRegion:
          title: GCP Region
          type: string
          description: Region to deploy the Cloud Function
          default: us-central1
          enum:
            - us-central1
            - us-east1
            - us-west1
            - europe-west1
            - asia-east1

        javaRuntime:
          title: Java Runtime
          type: string
          description: Java version for the Cloud Function runtime
          default: java21
          enum:
            - java21
            - java17
          enumNames:
            - Java 21 (Recommended)
            - Java 17

        triggerType:
          title: Trigger Type
          type: string
          description: How the Cloud Function will be triggered
          default: http
          enum:
            - http
            - pubsub
          enumNames:
            - HTTP (REST endpoint)
            - Pub/Sub (event-driven)

        owner:
          title: Team Owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group

  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./content
        copyWithoutTemplating:
          - .github/workflows/*
        values:
          repoOwner: ${{ parameters.repoOwner }}
          repoName: ${{ parameters.repoName | lower }}
          functionName: ${{ parameters.functionName | lower }}
          gcpProjectId: ${{ parameters.gcpProjectId }}
          gcpRegion: ${{ parameters.gcpRegion }}
          javaRuntime: ${{ parameters.javaRuntime }}
          triggerType: ${{ parameters.triggerType }}

    - id: submit-request
      name: Submit Repository Request
      action: github:repository-request:create-pr
      input:
        repoOwner: ${{ parameters.repoOwner }}
        repoName: ${{ parameters.repoName | lower }}
        description: GCP Cloud Function - ${{ parameters.functionName }}
        templateName: gcp-cloudfunction-java-template
        templateTitle: GCP Cloud Function (Java)
        repoVisibility: public
        defaultBranch: main
        catalogInfoPath: /catalog-info.yaml
        parameters:
          functionName: ${{ parameters.functionName | lower }}
          gcpProjectId: ${{ parameters.gcpProjectId }}
          gcpRegion: ${{ parameters.gcpRegion }}

    - id: notify
      name: Notify
      action: notification:send
      input:
        recipients: entity
        entityRefs:
          - user:default/guest
        title: "Repository request submitted"
        info: "GCP Cloud Function repository request is pending Platform Team approval"
        severity: normal

  output:
    text:
      - title: Request ID
        content: ${{ steps['submit-request'].output.requestId }}
      - title: Status
        content: ${{ steps['submit-request'].output.status }}
    links:
      - title: Approval Pull Request
        url: ${{ steps['submit-request'].output.pullRequestUrl }}
      - title: GitHub Actions
        url: https://github.com/${{ parameters.repoOwner }}/${{ parameters.repoName }}/actions/workflows/ci.yml
      - title: GCP Console
        url: https://console.cloud.google.com/functions/list?project=${{ parameters.gcpProjectId }}
      - title: Sonar Dashboard
        url: https://sonarcloud.io/project/overview?id=${{ parameters.repoName }}
