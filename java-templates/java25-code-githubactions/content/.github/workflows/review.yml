name: Review

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn clean verify

      - name: Upload Jar
        uses: actions/upload-artifact@v5
        with:
          name: app-jar
          path: target/*.jar

  sonar:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Verify Sonar Token
        env:
          SONAR_TOKEN: ${{ secrets.GIT_SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is missing"
            exit 1
          fi

      - name: Create Sonar Project If Missing
        env:
          SONAR_TOKEN: ${{ secrets.GIT_SONAR_TOKEN }}
        run: |
          PROJECT_KEY="devops-champ_${{ github.event.repository.name }}"

          curl -u "${SONAR_TOKEN}:" \
            -X POST \
            "https://sonarcloud.io/api/projects/create" \
            -d "organization=devops-champ" \
            -d "project=${PROJECT_KEY}" \
            -d "name=${PROJECT_KEY}"
        continue-on-error: true

      - name: Sonar Scan
        env:
          SONAR_TOKEN: ${{ secrets.GIT_SONAR_TOKEN }}
        run: |
          PROJECT_KEY="devops-champ_${{ github.event.repository.name }}"

          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=${PROJECT_KEY} \
            -Dsonar.organization=devops-champ \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN

  docker:
    runs-on: ubuntu-latest
    needs:
      - build
      - sonar

    steps:
      - uses: actions/checkout@v5

      - name: Download Jar
        uses: actions/download-artifact@v5
        with:
          name: app-jar
          path: target

      - name: Build Docker Image
        run: |
          IMAGE=${{ github.repository_owner }}/${{ github.event.repository.name }}
          docker build -t "$IMAGE:review-${GITHUB_SHA::12}" .

      - name: Verify Docker Images
        run: docker images
