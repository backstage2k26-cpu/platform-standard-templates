apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: java25-code-githubactions
  title: Java 25 Code GitHub Actions Template
  description: Create a Java 25 service repository in GitHub with GitHub Actions
  tags:
    - java
    - githubactions
    - sonarqube
spec:
  owner: user:default/guest
  type: service

  parameters:
    - title: Repository Details
      required:
        - repoOwner
        - repoName
        - owner
      properties:
        repoOwner:
          title: Repository Owner
          type: string
          description: GitHub organization or username
          default: devops-champ
          ui:autofocus: true

        repoName:
          title: Repository Name
          type: string
          description: Name of the GitHub repository (lowercase recommended)

        owner:
          title: Team Owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group
    
  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./content
        copyWithoutTemplating:
        - .github/workflows/*
        values:
          repoOwner: ${{ parameters.repoOwner }}
          repoName: ${{ parameters.repoName | lower }}

    - id: submit-request
      name: Submit Repository Request
      action: github:repository-request:create-pr
      input:
        repoOwner: ${{ parameters.repoOwner }}
        repoName: ${{ parameters.repoName | lower }}
        templateName: java25-code-githubactions
        templateTitle: Java 25 Code GitHub Actions Template
        repoVisibility: public
        defaultBranch: main
        catalogInfoPath: /catalog-info.yaml

    - id: notify
      name: Notify
      action: notification:send
      input:
        recipients: entity
        entityRefs:
          - user:default/guest
        title: "Repository request submitted"
        info: "Java 25 GitHub Actions repository request is pending Platform Team approval"
        severity: normal

  output:
    text:
      - title: Request ID
        content: ${{ steps['submit-request'].output.requestId }}
      - title: Status
        content: ${{ steps['submit-request'].output.status }}
    links:
      - title: Approval Pull Request
        url: ${{ steps['submit-request'].output.pullRequestUrl }}
      - title: Sonar Dashboard
        url: https://sonarcloud.io/project/overview?id=${{ parameters.repoName }}
      - title: GitHub Actions
        url: https://github.com/${{ parameters.repoOwner }}/${{ parameters.repoName }}/actions/workflows/ci.yml
