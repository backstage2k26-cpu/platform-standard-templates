apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: postgres-liquibase-template
  title: PostgreSQL Liquibase Template
  description: Create a PostgreSQL schema migration repository with Docker and Argo CD deployment manifests
  tags:
    - postgres
    - postgresql
    - liquibase
    - database
    - argocd
spec:
  owner: user:default/guest
  type: resource

  parameters:
    - title: Repository Details
      required:
        - repoOwner
        - repoName
        - owner
      properties:
        repoOwner:
          title: Repository Owner
          type: string
          description: GitHub organization or username
          default: devops-champ
          ui:autofocus: true

        repoName:
          title: Repository Name
          type: string
          description: Name of the GitHub repository (lowercase recommended)

        owner:
          title: Team Owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group

    - title: Database Details
      required:
        - databaseName
        - schemaName
      properties:
        databaseName:
          title: Database Name
          type: string
          description: Target PostgreSQL database name
          default: appdb

        schemaName:
          title: Schema Name
          type: string
          description: PostgreSQL schema managed by Liquibase
          default: app

        imageRegistry:
          title: Image Registry
          type: string
          description: Container registry used by Argo CD deployments
          default: ghcr.io/devops-champ

  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./content
        copyWithoutTemplating:
          - .github/workflows/*
        values:
          repoOwner: ${{ parameters.repoOwner }}
          repoName: ${{ parameters.repoName | lower }}
          owner: ${{ parameters.owner }}
          databaseName: ${{ parameters.databaseName }}
          schemaName: ${{ parameters.schemaName }}
          imageRegistry: ${{ parameters.imageRegistry }}

    - id: submit-request
      name: Submit Repository Request
      action: github:repository-request:create-pr
      input:
        repoOwner: ${{ parameters.repoOwner }}
        repoName: ${{ parameters.repoName | lower }}
        templateName: postgres-liquibase-template
        templateTitle: PostgreSQL Liquibase Template
        repoVisibility: public
        defaultBranch: main
        catalogInfoPath: /catalog-info.yaml
        parameters:
          owner: ${{ parameters.owner }}
          databaseName: ${{ parameters.databaseName }}
          schemaName: ${{ parameters.schemaName }}

    - id: notify
      name: Notify
      action: notification:send
      input:
        recipients: entity
        entityRefs:
          - user:default/guest
        title: "Repository request submitted"
        info: "PostgreSQL Liquibase repository request is pending Platform Team approval"
        severity: normal

  output:
    text:
      - title: Request ID
        content: ${{ steps['submit-request'].output.requestId }}
      - title: Status
        content: ${{ steps['submit-request'].output.status }}
    links:
      - title: Approval Pull Request
        url: ${{ steps['submit-request'].output.pullRequestUrl }}
