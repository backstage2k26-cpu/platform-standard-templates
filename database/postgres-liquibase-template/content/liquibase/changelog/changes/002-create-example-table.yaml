databaseChangeLog:
  - changeSet:
      id: 002-create-example-table
      author: platform
      changes:
        - createTable:
            schemaName: ${{ values.schemaName }}
            tableName: schema_version_example
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: description
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            schemaName: ${{ values.schemaName }}
            tableName: schema_version_example
