services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${{ values.databaseName }}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${{ values.databaseName }}"]
      interval: 5s
      timeout: 5s
      retries: 10

  liquibase:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LIQUIBASE_COMMAND_URL: jdbc:postgresql://postgres:5432/${{ values.databaseName }}
      LIQUIBASE_COMMAND_USERNAME: postgres
      LIQUIBASE_COMMAND_PASSWORD: postgres
    command:
      - --defaults-file=/liquibase/liquibase.properties
      - update
