image:
  repository: ${{ values.imageRegistry }}/${{ values.repoName }}
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

database:
  existingSecret: ${{ values.repoName }}-db
  urlKey: url
  usernameKey: username
  passwordKey: password

liquibase:
  contexts: ""
  labels: ""
  command: update
  logLevel: info
  changelogFile: changelog/db.changelog-master.yaml

job:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
