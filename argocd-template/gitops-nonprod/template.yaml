apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: argocd-template-nonprod
  title: Argo CD Template for Non-Prod
  description: Create Argo CD Application manifests for dev or qa
  tags:
    - argocd
    - gitops
    - kubernetes
spec:
  owner: user:default/guest
  type: resource

  parameters:
    - title: Application Details
      required:
        - environment
        - repoOwner
        - repoName
        - imageRegistry
      properties:
        environment:
          title: Environment
          type: string
          description: Select the non-prod environment
          enum:
            - dev
            - qa
          enumNames:
            - DEV
            - QA
          ui:autofocus: true

        repoOwner:
          title: Repository Owner
          type: string
          description: GitHub organization or username
          default: devops-champ

        repoName:
          title: Repository Name
          type: string
          description: Name of the GitHub repository

        imageRegistry:
          title: Image Registry
          type: string
          description: Container registry for the application image
          default: ghcr.io/devops-champ

  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./content
        values:
          repoOwner: ${{ parameters.repoOwner }}
          repoName: ${{ parameters.repoName | lower }}
          imageRegistry: ${{ parameters.imageRegistry }}
          environment: ${{ parameters.environment }}

    - id: publish-pr
      name: Create Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=backstage2k26-cpu&repo=gitops-nonprod
        branchName: argocd/${{ parameters.repoName | lower }}-${{ parameters.environment }}
        title: "Add Argo CD ${{ parameters.environment }} manifests for ${{ parameters.repoName | lower }}"
        description: "Generated Argo CD ${{ parameters.environment }} deployment files from the template."
        sourcePath: .

  output:
    links:
      - title: Pull Request
        url: ${{ steps.publish-pr.output.remoteUrl }}
