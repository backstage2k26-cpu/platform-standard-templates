apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: argocd-template-dev
  title: Argo CD Template for DEV
  description: Create Argo CD Application manifests for dev
  tags:
    - argocd
    - gitops
    - kubernetes
spec:
  owner: user:default/guest
  type: resource

  parameters:
    - title: Application Details
      required:
        - targetRepoUrl
        - repoOwner
        - repoName
        - imageRegistry
      properties:
        targetRepoUrl:
          title: Target Repository
          type: string
          description: GitHub repository that should receive the Argo CD files
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

        repoOwner:
          title: Repository Owner
          type: string
          description: GitHub organization or username
          default: devops-champ
          ui:autofocus: true

        repoName:
          title: Repository Name
          type: string
          description: Name of the GitHub repository

        imageRegistry:
          title: Image Registry
          type: string
          description: Container registry for the application image
          default: ghcr.io/devops-champ

  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./content
        values:
          repoOwner: ${{ parameters.repoOwner }}
          repoName: ${{ parameters.repoName | lower }}
          imageRegistry: ${{ parameters.imageRegistry }}

    - id: publish-pr
      name: Create Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: ${{ parameters.targetRepoUrl }}
        branchName: argocd/${{ parameters.repoName | lower }}-dev
        title: "Add Argo CD dev manifests for ${{ parameters.repoName | lower }}"
        description: "Generated Argo CD dev deployment files from the template."
        sourcePath: .

  output:
    links:
      - title: Pull Request
        url: ${{ steps.publish-pr.output.remoteUrl }}
